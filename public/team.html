<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группа</title>
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            padding: 40px 20px;
            min-height: 100vh;
        }

        .team-page {
            max-width: 740px;
            margin: 0 auto;
        }

        .team-header {
            text-align: center;
            margin-bottom: 32px;
            padding: 28px 24px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.06), rgba(59, 130, 246, 0.04));
            border-radius: var(--r-lg);
            border: 1px solid var(--border);
        }

        .team-name {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
            color: var(--text);
        }

        .team-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .team-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .team-stat {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .team-stat strong {
            color: var(--text);
            font-size: 15px;
            font-weight: 650;
        }

        .org-section {
            margin-bottom: 20px;
        }

        .org-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            overflow: hidden;
            transition: transform var(--ease), box-shadow var(--ease);
        }

        .org-card:hover {
            transform: scale(1.01);
            box-shadow: var(--shadow-md);
        }

        .org-header {
            padding: 12px 16px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
        }

        .org-name {
            font-weight: 650;
            font-size: 14px;
        }

        .team-block {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }

        .team-block:first-of-type {
            padding-top: 8px;
        }

        .team-block:last-child {
            border-bottom: none;
            padding-bottom: 12px;
        }

        .team-label {
            font-size: 13px;
            font-family: 'SF Mono', SFMono-Regular, ui-monospace, monospace;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.3px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .handles-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .handle-chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 14px;
            font-family: 'SF Mono', SFMono-Regular, ui-monospace, monospace;
            color: var(--cf-blue);
            text-decoration: none;
            transition: background var(--ease), border-color var(--ease), color var(--ease);
            cursor: pointer;
        }

        .handle-chip:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.5);
            color: #2563eb;
        }

        .not-found {
            text-align: center;
            padding: 80px 20px;
        }

        .not-found-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .not-found-text {
            color: var(--text-muted);
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .team-name {
                font-size: 20px;
            }

            .team-stats {
                flex-wrap: wrap;
                gap: 12px;
            }

            .org-header {
                padding: 10px 12px;
            }

            .team-block {
                padding: 10px 12px;
            }

            .handle-chip {
                font-size: 13px;
                padding: 5px 12px;
            }
        }
    </style>
</head>

<body>
    <div class="team-page" id="team-content">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        function pluralize(n, one, few, many) {
            const mod10 = n % 10;
            const mod100 = n % 100;
            if (mod100 >= 11 && mod100 <= 19) return many;
            if (mod10 === 1) return one;
            if (mod10 >= 2 && mod10 <= 4) return few;
            return many;
        }

        const TEAM_COLORS = [
            '#22c55e', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6',
            '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#06b6d4'
        ];

        function teamColor(index) {
            return TEAM_COLORS[index % TEAM_COLORS.length];
        }

        async function loadTeam() {
            const id = window.location.pathname.split('/').pop();
            const container = document.getElementById('team-content');

            try {
                const res = await fetch(`/api/public/groups/${id}`);
                if (!res.ok) throw new Error('not found');
                const { group, members } = await res.json();

                document.title = group.name;

                const orgs = {};
                for (const m of members) {
                    const org = m.org_name || '';
                    if (!orgs[org]) orgs[org] = {};
                    const team = m.team_name || '';
                    if (!orgs[org][team]) orgs[org][team] = [];
                    orgs[org][team].push(m.handle);
                }

                const orgCount = Object.keys(orgs).length;
                const teamCount = Object.values(orgs).reduce((s, teams) => s + Object.keys(teams).length, 0);

                const memberWord = pluralize(members.length, 'участник', 'участника', 'участников');
                const teamWord = pluralize(teamCount, 'команда', 'команды', 'команд');
                const orgWord = orgCount === 1 ? 'учебное заведение' : pluralize(orgCount, 'учебное заведение', 'учебных заведения', 'учебных заведений');

                let html = `
                    <div class="team-header">
                        <div class="team-name">${group.name}</div>
                        ${group.description ? `<div class="team-desc">${group.description}</div>` : ''}
                        <div class="team-stats">
                            <div class="team-stat"><strong>${members.length}</strong> ${memberWord}</div>
                            <div class="team-stat"><strong>${teamCount}</strong> ${teamWord}</div>
                            <div class="team-stat"><strong>${orgCount}</strong> ${orgWord}</div>
                        </div>
                    </div>
                `;

                for (const [org, teams] of Object.entries(orgs)) {
                    const orgLabel = org || 'Прочее';
                    html += `
                        <div class="org-section">
                            <div class="org-card">
                                <div class="org-header">
                                    <span class="org-name">${orgLabel}</span>
                                </div>
                    `;

                    for (const [team, handles] of Object.entries(teams)) {
                        html += `<div class="team-block">`;
                        if (team) {
                            html += `<div class="team-label"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#22c55e;flex-shrink:0"></span>${team}</div>`;
                        }
                        html += `<div class="handles-grid">`;
                        for (const h of handles) {
                            html += `<a class="handle-chip" href="https://codeforces.com/profile/${encodeURIComponent(h)}" target="_blank" rel="noopener">${h}</a>`;
                        }
                        html += `</div></div>`;
                    }

                    html += `</div></div>`;
                }

                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `
                    <div class="not-found">
                        <div class="not-found-icon">🔍</div>
                        <div class="not-found-text">Группа не найдена</div>
                    </div>
                `;
            }
        }

        loadTeam();
    </script>
</body>

</html>
